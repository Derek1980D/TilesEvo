<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TilesEvo - Tile Based Resource Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f3460;
        }
        
        #gameCanvas {
            display: block;
            border: 3px solid #e94560;
            background: #1a1a2e;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            font-size: 16px;
            z-index: 10;
            font-weight: bold;
            font-family: monospace;
            line-height: 1.8;
        }
        
        .stat {
            margin: 5px 0;
        }
        
        .stat-label {
            color: #16f4d0;
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #16f4d0;
            font-size: 14px;
            text-align: center;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="stat">Grid: <span class="stat-label" id="gridSize">16x16</span></div>
            <div class="stat">Tiles: <span class="stat-label" id="tileCount">0</span></div>
            <div class="stat">Resources: <span class="stat-label" id="resources">0</span></div>
        </div>
        <div id="info">Click to place tiles • Right-click to remove</div>
    </div>

    <script>
        // ========== GRID SYSTEM ==========
        const GRID_WIDTH = 16;
        const GRID_HEIGHT = 16;
        const TILE_SIZE = 40;
        const GRID_COLOR = '#2a2a4a';
        const GRID_LINE_COLOR = '#3a3a5a';
        const TILE_COLOR = '#16f4d0';
        const TILE_BORDER_COLOR = '#0fbfa0';
        const EMPTY_COLOR = '#1a1a2e';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size based on grid
        canvas.width = GRID_WIDTH * TILE_SIZE;
        canvas.height = GRID_HEIGHT * TILE_SIZE;
        
        // Grid state: 0 = empty, 1 = filled
        const grid = Array(GRID_HEIGHT).fill(null).map(() => Array(GRID_WIDTH).fill(0));
        
        // Game state
        let stats = {
            tiles: 0,
            resources: 10 // Start with 10 resources
        };

        // ========== FUNCTIONS ==========
        
        function getGridCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const col = Math.floor(x / TILE_SIZE);
            const row = Math.floor(y / TILE_SIZE);
            
            if (col >= 0 && col < GRID_WIDTH && row >= 0 && row < GRID_HEIGHT) {
                return { row, col };
            }
            return null;
        }
        
        function placeTile(row, col) {
            if (grid[row][col] === 0 && stats.resources > 0) {
                grid[row][col] = 1;
                stats.tiles++;
                stats.resources--;
                updateUI();
                draw();
            }
        }
        
        function removeTile(row, col) {
            if (grid[row][col] === 1) {
                grid[row][col] = 0;
                stats.tiles--;
                stats.resources++;
                updateUI();
                draw();
            }
        }
        
        function updateUI() {
            document.getElementById('tileCount').textContent = stats.tiles;
            document.getElementById('resources').textContent = stats.resources;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = EMPTY_COLOR;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = GRID_LINE_COLOR;
            ctx.lineWidth = 1;
            
            // Vertical lines
            for (let col = 0; col <= GRID_WIDTH; col++) {
                ctx.beginPath();
                ctx.moveTo(col * TILE_SIZE, 0);
                ctx.lineTo(col * TILE_SIZE, canvas.height);
                ctx.stroke();
            }
            
            // Horizontal lines
            for (let row = 0; row <= GRID_HEIGHT; row++) {
                ctx.beginPath();
                ctx.moveTo(0, row * TILE_SIZE);
                ctx.lineTo(canvas.width, row * TILE_SIZE);
                ctx.stroke();
            }
            
            // Draw tiles
            for (let row = 0; row < GRID_HEIGHT; row++) {
                for (let col = 0; col < GRID_WIDTH; col++) {
                    if (grid[row][col] === 1) {
                        const x = col * TILE_SIZE;
                        const y = row * TILE_SIZE;
                        
                        // Tile background
                        ctx.fillStyle = TILE_COLOR;
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        
                        // Tile border
                        ctx.strokeStyle = TILE_BORDER_COLOR;
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            }
        }
        
        // ========== EVENT LISTENERS ==========
        
        canvas.addEventListener('click', (e) => {
            const coords = getGridCoords(e.clientX, e.clientY);
            if (coords) {
                placeTile(coords.row, coords.col);
            }
        });
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const coords = getGridCoords(e.clientX, e.clientY);
            if (coords) {
                removeTile(coords.row, coords.col);
            }
        });
        
        // ========== GAME LOOP ==========
        
        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Initialize
        updateUI();
        gameLoop();
    </script>
</body>
</html>
